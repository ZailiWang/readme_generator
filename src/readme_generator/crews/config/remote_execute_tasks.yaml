remote_execution_task:
  description: >
    This agent is responsible for reading model-related data from global memory, extracting and adapting model execution commands, running commands via remote Docker sandboxes, analyzing execution results, and storing results. The core functions are as follows:Data Retrieval: Use the memory_retrieve tool to fetch the generated README content lists and corresponding model information from the GLOBAL_MEMORY.Command Extraction & Adaptation: Extract all execution commands for each model from the README content lists. This includes model download commands (from Hugging Face/hf-mirror), model launch commands, and benchmarking commands (e.g., bench_serving). If the extracted commands are not fully compatible with the target model, modify them appropriately to ensure executability.Command Grouping & Sandbox Deployment: Since different command types (download, launch, benchmark) cannot be executed in sequence, group them into separate command lists. Based on the specified remote directory {remote_folder}, deploy Docker sandboxes within the terminal of that folder. Generate complete operation commands covering directory navigation, sandbox construction, command list execution, and final sandbox destruction.Remote Execution & Result Analysis: Use the remote server command execution tool to run the complete operation commands and obtain execution results and logs. Analyze the results to identify issue types: if the problem stems from command construction, optimize the commands (with a limit to prevent endless iteration). If the issue is model-related, record the problem details.Result Aggregation & Storage: Aggregate the execution results of all command lists for a single model. Store the aggregated results (including successful outputs, error details, and logs) as a list in the GLOBAL_MEMORY, where each element corresponds to the complete execution record of one model.
  expected_output: >
    Command execution result or error analysis report, and all execution information has been stored in GLOBAL_MEMORY.
  agent: remote_execution_agent