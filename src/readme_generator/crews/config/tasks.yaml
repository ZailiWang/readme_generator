model_search_task:
  description: >
    According to the input {model_name}, use the model search tool to locate the official Hugging Face URL of the corresponding AI model.Automatically store the obtained model_name and model_url into GLOBAL_MEMORY through the memory_store tool for use by subsequent agents.
  expected_output: >
    The valid Hugging Face URL of the target model, and the information has been persisted to GLOBAL_MEMORY.

readme_generate_task:
  description: >
    Automatically retrieve model_name and model_url from GLOBAL_MEMORY using the memory_retrieve tool.Combined with reference example {reference_example}, generate a complete, standardized README document for the model.Use the memory_store tool to save the generated README content into GLOBAL_MEMORY for subsequent execution and storage.
  expected_output: >
    Complete and structured model README document, with content synchronized to GLOBAL_MEMORY.

remote_execution_task:
  description: >
    Use the memory_retrieve tool to get the generated readme_content from GLOBAL_MEMORY.Use the extract_shell_commands tool to parse out executable shell or cmd commands from the README.Remotely connect to the server and run these commands in the specified remote_folder.Parse the execution output, analyze errors if any, and store execution results and logs into GLOBAL_MEMORY via memory_store.
  expected_output: >
    Command execution result or error analysis report, and all execution information has been stored in GLOBAL_MEMORY.

readme_merge_task:
  description: >
    Receive a list of model names {model_list}, which belong to the same model series (such as Llama3 with different precisions like fp8, int4, fp16).Use the memory_retrieve tool to obtain the README content of each model from GLOBAL_MEMORY.Merge all individual READMEs into one unified, structured, and complete README document, keeping consistent descriptions while highlighting differences in precision, performance, and usage scenarios.Use the memory_store tool to save the merged final README into GLOBAL_MEMORY for subsequent tasks.
  expected_output: >
    A complete merged README document for the entire model series, with unified structure, clear comparison of different versions, and standardized format with reference to {output_example}.The merged content has been stored in GLOBAL_MEMORY for subsequent use.

github_pr_task:
  description: >
    Receive GitHub PR submission parameters, including {github_token}, {repo_owner}, {repo_name}, {base_branch}, {head_branch}, {pr_title}, {pr_description}, {commit_message}.Use the memory_retrieve tool to get the merged model series README document from GLOBAL_MEMORY.The github_manager agent will automatically authenticate with {github_token}, check if the target PR already exists in the repository: create a new PR if not exists, or update the existing PR with the latest merged README.Push the merged README to the specified branch and complete the PR creation or update process safely.Use the memory_store tool to save PR information (PR number, URL, status) into GLOBAL_MEMORY.
  expected_output: >
    A complete PR execution report, including PR status (created/updated), PR number, PR URL, commit status, and verification that the merged README has been correctly submitted.All PR records are stored in GLOBAL_MEMORY for traceability.
